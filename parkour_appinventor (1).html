<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parkour Runner</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0;
      -webkit-tap-highlight-color:transparent; user-select:none; }

  body {
    background:#e8e8e8;
    font-family: Arial, sans-serif;
    display:flex; flex-direction:column;
    align-items:center; height:100vh; overflow:hidden;
  }

  /* Top bar - MIT App Inventor style */
  #topbar {
    width:100%; max-width:430px;
    background:#4a86e8;
    padding:8px 14px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  #topbar .title { color:#fff; font-size:15px; font-weight:bold; }
  #topbar .score { background:#fff; border-radius:4px; padding:4px 10px;
                   font-size:12px; font-weight:bold; color:#333; }



  /* Canvas - fundo se move via JS (background-position) */
  #canvas-wrap {
    width:100%; max-width:430px;
    position:relative; overflow:hidden;
    flex:1;
    /* Fundo com padrão de tijolos que se move */
    background-color:#87CEEB;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px),
      repeating-linear-gradient(
        0deg,
        transparent, transparent 19px,
        rgba(180,120,60,0.15) 19px, rgba(180,120,60,0.15) 20px
      ),
      repeating-linear-gradient(
        90deg,
        transparent, transparent 39px,
        rgba(180,120,60,0.1) 39px, rgba(180,120,60,0.1) 40px
      );
    background-size: 40px 20px, 40px 20px, 40px 20px, 40px 20px;
    background-attachment: local;
  }

  /* HUD dentro do canvas */
  #hud {
    position:absolute; top:6px; left:0; right:0;
    display:flex; justify-content:space-between; padding:0 8px;
    pointer-events:none; z-index:20;
  }
  .hud-box {
    background:rgba(255,255,255,0.9);
    border:2px solid #9aa0a6; border-radius:4px;
    padding:3px 10px; font-size:11px; font-weight:bold; color:#333;
  }

  /* Sprites - posição absoluta como App Inventor */
  .sprite { position:absolute; }

  /* Plataformas */
  .plat {
    border-radius:3px;
    border-bottom:4px solid rgba(0,0,0,0.25);
  }
  .pg { background:#4CAF50; border-top:5px solid #66BB6A; }
  .pb { background:#8D6E63; border-top:5px solid #A1887F; }
  .pz { background:#42A5F5; border-top:5px solid #64B5F6; }
  .po { background:#FF7043; border-top:5px solid #FF8A65; }
  .pp { background:#AB47BC; border-top:5px solid #CE93D8; }
  .py { background:#FDD835; border-top:5px solid #FFEE58; }

  /* Espinhos */
  .spike { font-size:20px; width:24px; height:24px;
           display:flex; align-items:center; justify-content:center; z-index:5; }

  /* Moedas */
  .coin {
    width:20px; height:20px; border-radius:50%;
    background:#FFD600; border:3px solid #F9A825;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; color:#E65100; font-weight:bold; z-index:5;
  }

  /* Jogador */
  #player { width:32px; height:36px; z-index:10; font-size:28px;
            display:flex; align-items:center; justify-content:center; }

  /* Bandeira */
  #flag-pole { position:absolute; width:5px; background:#9E9E9E; z-index:5; }
  #flag-icon { position:absolute; font-size:24px; z-index:6; }

  /* Tela overlay (Screen1 do App Inventor) */
  .screen {
    position:absolute; inset:0;
    background:rgba(255,255,255,0.96);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; z-index:30; padding:20px;
  }
  .screen h2 { font-size:19px; color:#222; font-weight:bold; text-align:center; }
  .screen p  { font-size:12px; color:#555; text-align:center; line-height:1.8; }
  .scr-icon  { font-size:50px; }

  /* Botões estilo MIT App Inventor */
  .ai-btn {
    background:#4a86e8; color:#fff; border:none; border-radius:4px;
    padding:13px 36px; font-size:14px; font-weight:bold; cursor:pointer;
    font-family:Arial,sans-serif; box-shadow:0 3px 0 #2a5db8;
    min-width:170px; text-align:center;
  }
  .ai-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #2a5db8; }
  .ai-btn.red   { background:#e53935; box-shadow:0 3px 0 #b71c1c; }
  .ai-btn.green { background:#43a047; box-shadow:0 3px 0 #2e7d32; }

  /* Controles */
  #controls {
    width:100%; max-width:430px;
    background:#e0e0e0; border-top:2px solid #bbb;
    padding:8px 10px 12px;
    display:grid;
    grid-template-columns:68px 1fr 68px;
    grid-template-rows:54px 54px;
    gap:7px; flex-shrink:0;
  }
  .cbtn {
    background:#fff; color:#333;
    border:2px solid #9aa0a6; border-radius:6px;
    font-size:22px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 3px 0 #9aa0a6;
  }
  .cbtn:active, .cbtn.pressed {
    background:#e8f0fe; border-color:#4a86e8;
    transform:translateY(2px); box-shadow:0 1px 0 #4a86e8;
  }
  #bl { grid-column:1; grid-row:1/span 2; border-radius:8px; font-size:30px; }
  #br { grid-column:3; grid-row:1/span 2; border-radius:8px; font-size:30px; }
  #bj {
    grid-column:2; grid-row:1;
    background:#4a86e8; color:#fff;
    border-color:#2a5db8; box-shadow:0 3px 0 #2a5db8;
    font-size:18px; font-weight:bold;
  }
  #bj.pressed { background:#2a5db8; border-color:#1a3d8f; box-shadow:0 1px 0 #1a3d8f; }
  #blabel {
    grid-column:2; grid-row:2;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; color:#999; font-weight:bold;
  }
</style>
</head>
<body>

<div id="topbar">
  <span class="title">🏃 Parkour Runner</span>
  <span class="score" id="score-box">Pontos: 0</span>
</div>

<div id="canvas-wrap">

  <div id="hud">
    <span class="hud-box" id="lives-box">❤️❤️❤️</span>
    <span class="hud-box" id="dist-box">0 m</span>
  </div>

  <!-- sprites criados por JS -->
  <div id="flag-pole" class="sprite"></div>
  <div id="flag-icon" class="sprite">🚩</div>
  <div id="player" class="sprite">🏃</div>

  <!-- Tela inicial -->
  <div class="screen" id="scr-start">
    <div class="scr-icon">🏃</div>
    <h2>Parkour Runner</h2>
    <p>
      Pule de plataforma em plataforma!<br>
      Colete moedas 🪙 (+10 pts)<br>
      Evite os espinhos ⚠️<br>
      Chegue à bandeira 🚩 para vencer!<br><br>
      <b>O cenário se move com você!</b>
    </p>
    <button class="ai-btn green" id="btn-start">▶ INICIAR</button>
  </div>

  <!-- Tela de fim -->
  <div class="screen" id="scr-over" style="display:none">
    <div class="scr-icon">😵</div>
    <h2>Fim de Jogo!</h2>
    <p id="over-txt">Pontuação: 0</p>
    <button class="ai-btn red" id="btn-retry">↺ TENTAR DE NOVO</button>
  </div>

  <!-- Tela de vitória -->
  <div class="screen" id="scr-win" style="display:none">
    <div class="scr-icon">🏆</div>
    <h2>Você Venceu!</h2>
    <p id="win-txt">Pontuação: 0</p>
    <button class="ai-btn green" id="btn-again">▶ JOGAR DE NOVO</button>
  </div>

</div>

<div id="controls">
  <div class="cbtn" id="bl">◀</div>
  <div class="cbtn" id="bj">▲ PULAR</div>
  <div class="cbtn" id="br">▶</div>
  <div id="blabel">CONTROLES</div>
</div>

<script>
const canvasWrap = document.getElementById('canvas-wrap');
const scoreBox   = document.getElementById('score-box');
const livesBox   = document.getElementById('lives-box');
const distBox    = document.getElementById('dist-box');
const playerEl   = document.getElementById('player');
const flagPole   = document.getElementById('flag-pole');
const flagIcon   = document.getElementById('flag-icon');

// ── Dimensões do canvas ──
let CW, CH;
function updateSize() {
  CW = canvasWrap.clientWidth;
  CH = canvasWrap.clientHeight;
}
updateSize();
window.addEventListener('resize', () => { updateSize(); if(running) rebuildLevel(); });

// ── Estado global ──
let score=0, lives=3, running=false, raf=null, frame=0;
let camX=0;
let jumpLatch=false;
const keys={left:false,right:false,jump:false};

// ── Jogador ──
const p = { x:80, y:0, w:32, h:36, vx:0, vy:0, onGround:false, invincible:0, dir:1 };

const GRAVITY=0.48, JUMP=-12, SPEED=3.2;

// ── Nível completo (parkour longo) ──
// Todas as posições em pixels absolutos do mundo
// Plataformas, moedas e espinhos são criados no mundo, câmera segue o jogador

const WORLD_W = 5000;

let platforms=[], coins=[], spikes=[], coinEls=[], spikeEls=[], platEls=[];

function buildWorld() {
  const H = CH, GH = 44;
  const ground = H - GH;

  platforms = [
    // chão inicial
    { x:0,    y:H-GH,  w:360,  h:GH, cls:'pg' },

    // vão 1 — pulo simples
    { x:420,  y:H-GH,  w:140,  h:GH, cls:'pg' },

    // subida em escada
    { x:620,  y:H-GH-40, w:80, h:14, cls:'pb' },
    { x:740,  y:H-GH-90, w:80, h:14, cls:'pz' },
    { x:860,  y:H-GH-140,w:80, h:14, cls:'po' },

    // plataforma alta com vão
    { x:1000, y:H-GH-140,w:120,h:14, cls:'pp' },
    { x:1180, y:H-GH-140,w:80, h:14, cls:'pp' },

    // descida perigosa (espinhos embaixo)
    { x:1320, y:H-GH-100,w:70, h:14, cls:'pb' },
    { x:1440, y:H-GH-60, w:70, h:14, cls:'pb' },
    { x:1560, y:H-GH,    w:200,h:GH, cls:'pg' },

    // sequência de blocos curtos — precisão
    { x:1820, y:H-GH-20, w:50, h:14, cls:'py' },
    { x:1920, y:H-GH-50, w:50, h:14, cls:'py' },
    { x:2020, y:H-GH-80, w:50, h:14, cls:'py' },
    { x:2120, y:H-GH-110,w:50, h:14, cls:'py' },
    { x:2220, y:H-GH-80, w:50, h:14, cls:'py' },
    { x:2320, y:H-GH-50, w:50, h:14, cls:'py' },
    { x:2420, y:H-GH-20, w:50, h:14, cls:'py' },

    // ilha grande
    { x:2530, y:H-GH,    w:300,h:GH, cls:'pg' },

    // torre de subida
    { x:2890, y:H-GH-50, w:70, h:14, cls:'pz' },
    { x:3010, y:H-GH-110,w:70, h:14, cls:'pz' },
    { x:2890, y:H-GH-170,w:70, h:14, cls:'pz' },
    { x:3010, y:H-GH-230,w:70, h:14, cls:'pz' },
    { x:2930, y:H-GH-290,w:110,h:14, cls:'po' },

    // travessia longa no alto
    { x:3100, y:H-GH-260,w:80, h:14, cls:'po' },
    { x:3230, y:H-GH-260,w:80, h:14, cls:'po' },
    { x:3360, y:H-GH-260,w:80, h:14, cls:'po' },

    // descida em zigue-zague
    { x:3500, y:H-GH-210,w:70, h:14, cls:'pb' },
    { x:3620, y:H-GH-160,w:70, h:14, cls:'pb' },
    { x:3740, y:H-GH-110,w:70, h:14, cls:'pb' },
    { x:3860, y:H-GH-60, w:70, h:14, cls:'pb' },

    // chão final com obstáculos
    { x:3980, y:H-GH,    w:600,h:GH, cls:'pg' },

    // plataformas finais antes da bandeira
    { x:4200, y:H-GH-80, w:80, h:14, cls:'pp' },
    { x:4340, y:H-GH-140,w:80, h:14, cls:'pp' },
    { x:4470, y:H-GH-80, w:80, h:14, cls:'pp' },
  ];

  coins = [
    // sobre vãos e plataformas
    {x:430,y:H-GH-100},{x:460,y:H-GH-100},
    {x:630,y:H-GH-120},{x:750,y:H-GH-170},{x:870,y:H-GH-220},
    {x:1010,y:H-GH-220},{x:1060,y:H-GH-220},{x:1190,y:H-GH-220},
    {x:1330,y:H-GH-180},{x:1450,y:H-GH-140},
    {x:1830,y:H-GH-110},{x:1930,y:H-GH-140},{x:2030,y:H-GH-170},
    {x:2130,y:H-GH-200},{x:2230,y:H-GH-170},{x:2330,y:H-GH-140},{x:2430,y:H-GH-110},
    {x:2560,y:H-GH-100},{x:2620,y:H-GH-100},{x:2700,y:H-GH-100},
    {x:2900,y:H-GH-130},{x:3020,y:H-GH-190},{x:2950,y:H-GH-370},
    {x:3110,y:H-GH-340},{x:3240,y:H-GH-340},{x:3370,y:H-GH-340},
    {x:3510,y:H-GH-290},{x:3630,y:H-GH-240},{x:3750,y:H-GH-190},
    {x:4010,y:H-GH-100},{x:4060,y:H-GH-100},{x:4110,y:H-GH-100},
    {x:4210,y:H-GH-160},{x:4350,y:H-GH-220},{x:4480,y:H-GH-160},
  ];

  spikes = [
    // nos vãos e bordas de plataformas
    {x:365,y:H-GH-28},{x:385,y:H-GH-28},{x:405,y:H-GH-28},
    {x:1260,y:H-GH-28},{x:1280,y:H-GH-28},
    {x:1760,y:H-GH-28},{x:1780,y:H-GH-28},{x:1800,y:H-GH-28},
    {x:2490,y:H-GH-28},{x:2510,y:H-GH-28},
    {x:2830,y:H-GH-28},{x:2850,y:H-GH-28},{x:2870,y:H-GH-28},
    {x:3940,y:H-GH-28},{x:3960,y:H-GH-28},
    {x:4140,y:H-GH-28},{x:4160,y:H-GH-28},{x:4180,y:H-GH-28},
  ];
}

// ── Criar/remover elementos DOM ──
function clearDOM() {
  platEls.forEach(e=>e.el.remove());
  coinEls.forEach(e=>e.el.remove());
  spikeEls.forEach(e=>e.el.remove());
  platEls=[]; coinEls=[]; spikeEls=[];
}

function createDOM() {
  platforms.forEach(pl => {
    const el=document.createElement('div');
    el.className='sprite plat '+pl.cls;
    el.style.width=pl.w+'px'; el.style.height=pl.h+'px';
    canvasWrap.appendChild(el);
    platEls.push({...pl, el});
  });

  coins.forEach((c,i) => {
    const el=document.createElement('div');
    el.className='coin sprite';
    el.textContent='●';
    canvasWrap.appendChild(el);
    coinEls.push({...c, w:20, h:20, el, collected:false, bi:i});
  });

  spikes.forEach(s => {
    const el=document.createElement('div');
    el.className='spike sprite';
    el.textContent='⚠️';
    canvasWrap.appendChild(el);
    spikeEls.push({...s, w:22, h:22, el});
  });

  // bandeira
  const flagH=160;
  flagPole.style.height=flagH+'px';
  flagPole.style.display='block';
  flagIcon.style.display='block';
}

// ── Posicionar todos os sprites pela câmera ──
function renderWorld() {
  platEls.forEach(r => {
    const sx = r.x - camX;
    r.el.style.left = sx+'px';
    r.el.style.top  = r.y+'px';
    // visibilidade simples
    r.el.style.display = (sx > -r.w-20 && sx < CW+20) ? 'block' : 'none';
  });

  coinEls.forEach(c => {
    if (c.collected) return;
    const sx = c.x - camX;
    c.el.style.left = sx+'px';
    c.el.style.top  = c.y+'px';
    c.el.style.display = (sx>-30 && sx<CW+30) ? 'block' : 'none';
  });

  spikeEls.forEach(s => {
    const sx = s.x - camX;
    s.el.style.left = sx+'px';
    s.el.style.top  = s.y+'px';
    s.el.style.display = (sx>-30 && sx<CW+30) ? 'block' : 'none';
  });

  // bandeira
  const flagWorldX = WORLD_W - 120;
  const flagH = 160;
  const fsx = flagWorldX - camX;
  flagPole.style.left = fsx+'px';
  flagPole.style.top  = (CH - 44 - flagH)+'px';
  flagPole.style.display = (fsx>-30&&fsx<CW+30)?'block':'none';
  flagIcon.style.left = (fsx+6)+'px';
  flagIcon.style.top  = (CH - 44 - flagH)+'px';
  flagIcon.style.display = flagPole.style.display;

  // fundo se move com parallax
  canvasWrap.style.backgroundPosition = `${-camX*0.5}px 0px, ${-camX*0.5}px 0px, ${-camX*0.4}px 0px, ${-camX*0.4}px 0px`;

  // jogador
  const psx = p.x - camX;
  playerEl.style.left      = Math.round(psx)+'px';
  playerEl.style.top       = Math.round(p.y)+'px';
  playerEl.textContent     = p.dir<0 ? '🚶' : '🏃';
  playerEl.style.transform = p.dir<0 ? 'scaleX(-1)' : 'scaleX(1)';
  playerEl.style.opacity   = (p.invincible>0 && Math.floor(p.invincible/6)%2) ? '0.3' : '1';

  // HUD
  distBox.textContent = Math.floor(p.x/50)+' m';
}

// ── AABB ──
function hits(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function resolvePlatforms() {
  platforms.forEach(pl => {
    if (!hits(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) return;
    // Colisao so pelo topo (one-way): pousa em cima, cai pelos lados livremente
    const prevBottom = p.y + p.h - p.vy;
    if (p.vy >= 0 && prevBottom <= pl.y + 4) {
      p.y = pl.y - p.h;
      p.vy = 0;
      p.onGround = true;
    }
  });
}

// ── Game loop ──
function tick() {
  if (!running) return;
  frame++;

  // Movimento
  if (keys.left)       { p.vx=-SPEED; p.dir=-1; }
  else if (keys.right) { p.vx= SPEED; p.dir= 1; }
  else p.vx *= 0.55;

  if (keys.jump && !jumpLatch && p.onGround) {
    p.vy=JUMP; jumpLatch=true; p.onGround=false;
  }
  if (!keys.jump) jumpLatch=false;

  p.vy += GRAVITY;
  if (p.vy>16) p.vy=16;
  p.x += p.vx;
  p.y += p.vy;
  p.onGround=false;

  // Chão do mundo (não tem chão contínuo, apenas plataformas)
  resolvePlatforms();

  // Limites horizontais do mundo
  if (p.x<0) { p.x=0; p.vx=0; }
  if (p.x>WORLD_W-p.w) { p.x=WORLD_W-p.w; p.vx=0; }

  // Caiu no abismo
  if (p.y > CH+60) loseLife();

  // Invencível
  if (p.invincible>0) p.invincible--;

  // Espinhos
  if (p.invincible===0) {
    spikeEls.forEach(s => {
      if (hits(p.x+4,p.y+6,p.w-8,p.h-8, s.x,s.y,s.w,s.h)) loseLife();
    });
  }

  // Moedas
  coinEls.forEach(c => {
    if (c.collected) return;
    if (hits(p.x,p.y,p.w,p.h, c.x,c.y,c.w,c.h)) {
      c.collected=true; c.el.style.display='none';
      score+=10; updateHUD();
      popText(p.x-camX+10, p.y-10, '+10');
    }
  });

  // Bandeira
  const flagWX=WORLD_W-120;
  if (hits(p.x,p.y,p.w,p.h, flagWX,CH-44-160,26,160)) victory();

  // Câmera segue o jogador (scroll horizontal)
  const target = p.x - CW/3;
  camX = Math.max(0, Math.min(target, WORLD_W-CW));

  updateHUD();
  renderWorld();
  raf = requestAnimationFrame(tick);
}

function updateHUD() {
  scoreBox.textContent='Pontos: '+score;
  livesBox.textContent='❤️'.repeat(Math.max(0,lives));
}

function loseLife() {
  lives--;
  updateHUD();
  if (lives<=0) {
    running=false;
    cancelAnimationFrame(raf);
    setTimeout(() => {
      document.getElementById('over-txt').textContent='Pontuação: '+score+' pontos';
      document.getElementById('scr-over').style.display='flex';
    }, 350);
    return;
  }
  // Respawn
  p.x=80; p.y=CH-130; p.vx=0; p.vy=0; p.invincible=100;
  camX=0;
}

function victory() {
  running=false;
  cancelAnimationFrame(raf);
  score+=200;
  setTimeout(() => {
    document.getElementById('win-txt').textContent='Pontuação: '+score+' pontos!';
    document.getElementById('scr-win').style.display='flex';
  }, 200);
}

function popText(x, y, txt) {
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${x}px;top:${y}px;
    background:#fff;border:2px solid #4a86e8;border-radius:4px;
    padding:2px 7px;font-size:12px;font-weight:bold;color:#333;
    z-index:50;pointer-events:none;`;
  d.textContent=txt;
  canvasWrap.appendChild(d);
  setTimeout(()=>d.remove(), 700);
}

function rebuildLevel() {
  clearDOM();
  buildWorld();
  createDOM();
}

function startGame() {
  document.getElementById('scr-start').style.display='none';
  document.getElementById('scr-over').style.display='none';
  document.getElementById('scr-win').style.display='none';
  updateSize();
  score=0; lives=3; frame=0; camX=0;
  p.x=80; p.y=CH-130; p.vx=0; p.vy=0; p.onGround=false; p.invincible=0;
  rebuildLevel();
  updateHUD();
  running=true;
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(tick);
}

// ── Botões ──
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', startGame);
document.getElementById('btn-again').addEventListener('click', startGame);

function bindBtn(id,key) {
  const el=document.getElementById(id);
  const on=()=>{keys[key]=true;  el.classList.add('pressed');};
  const off=()=>{keys[key]=false; el.classList.remove('pressed');};
  el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}
bindBtn('bl','left');
bindBtn('br','right');
bindBtn('bj','jump');

document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a'].includes(e.key)) keys.left=true;
  if(['ArrowRight','d'].includes(e.key)) keys.right=true;
  if(['ArrowUp','w',' '].includes(e.key)){keys.jump=true;e.preventDefault();}
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','a'].includes(e.key)) keys.left=false;
  if(['ArrowRight','d'].includes(e.key)) keys.right=false;
  if(['ArrowUp','w',' '].includes(e.key)) keys.jump=false;
});
</script>
